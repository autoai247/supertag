<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>로그인 - InstaFinder</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <style>*{font-family:"Pretendard Variable",Pretendard,sans-serif;}input{outline:none;}</style>
</head>
<body class="min-h-screen flex items-center justify-center" style="background:#0f172a;">
  <div class="w-80">
    <div class="text-center mb-7">
      <div class="w-12 h-12 rounded-xl mx-auto mb-3 flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <h1 class="text-xl font-bold text-white">InstaFinder</h1>
      <p class="text-xs mt-1 text-gray-500">한국 인플루언서 데이터베이스</p>
    </div>
    <div class="rounded-2xl p-6" style="background:#1e293b;border:1px solid #334155;">
      {% if error %}<div class="mb-4 px-3 py-2.5 rounded-lg text-xs text-red-300" style="background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);">{{ error }}</div>{% endif %}
      <form action="/login" method="post" class="space-y-3">
        <input type="text" name="username" placeholder="아이디" required
          class="w-full px-3 py-2.5 rounded-lg text-sm text-white placeholder-gray-500 transition"
          style="background:#0f172a;border:1px solid #334155;"
          onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#334155'">
        <input type="password" name="password" placeholder="비밀번호" required
          class="w-full px-3 py-2.5 rounded-lg text-sm text-white placeholder-gray-500 transition"
          style="background:#0f172a;border:1px solid #334155;"
          onfocus="this.style.borderColor='#6366f1'" onblur="this.style.borderColor='#334155'">
        <button type="submit" class="w-full py-2.5 rounded-lg font-semibold text-white text-sm hover:opacity-90 transition"
          style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">로그인</button>
      </form>
    </div>
  </div>
</body>
</html>
