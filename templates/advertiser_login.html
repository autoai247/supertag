<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>광고주 로그인 - SuperTag</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <style>* { font-family:"Pretendard Variable",sans-serif; }</style>
</head>
<body style="background:linear-gradient(135deg,#0f172a 0%,#1e1b4b 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;">
<div class="w-full max-w-sm mx-4">
  <div class="text-center mb-8">
    <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
      <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
    </div>
    <h1 class="text-2xl font-bold text-white">광고주 로그인</h1>
    <p class="text-indigo-300 text-sm mt-1">인플루언서 데이터베이스 접근</p>
  </div>
  <div class="bg-white rounded-2xl p-6 shadow-2xl">
    {% if error %}
    <div class="mb-4 px-4 py-3 rounded-xl bg-red-50 border border-red-200 text-red-600 text-sm">{{ error }}</div>
    {% endif %}
    <form action="/advertiser/login" method="post" class="space-y-4">
      <div>
        <label class="text-sm font-medium text-gray-700 mb-1 block">아이디</label>
        <input type="text" name="username" required autofocus
               class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
      </div>
      <div>
        <label class="text-sm font-medium text-gray-700 mb-1 block">비밀번호</label>
        <input type="password" name="password" required
               class="w-full px-4 py-3 rounded-xl border border-gray-200 text-sm focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
      </div>
      <button type="submit" class="w-full py-3 rounded-xl font-semibold text-white text-sm"
              style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">로그인</button>
    </form>
    <div class="mt-4 text-center">
      <a href="/" class="text-xs text-gray-400 hover:text-gray-600">← 메인 페이지로</a>
    </div>
  </div>
</div>
</body>
</html>
