{% extends "base.html" %}
{% set active = "settings" %}
{% block title %}설정 - InstaFinder{% endblock %}
{% block content %}
<div class="mb-5">
  <h1 class="text-xl font-bold text-gray-900">설정</h1>
  <p class="text-sm text-gray-500 mt-0.5">인스타그램 수집 계정을 설정합니다.</p>
</div>

<div class="max-w-lg card p-6">
  <h2 class="font-semibold text-gray-800 mb-4">인스타그램 크롤링 계정</h2>
  <form action="/settings/save" method="post" class="space-y-4">
    <div>
      <label class="text-xs font-medium text-gray-500 block mb-1">인스타그램 아이디</label>
      <input type="text" name="insta_username" value="{{ insta_username }}" required
        class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200">
    </div>
    <div>
      <label class="text-xs font-medium text-gray-500 block mb-1">비밀번호</label>
      <input type="password" name="insta_password" placeholder="변경 시에만 입력" required
        class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200">
    </div>
    <div>
      <label class="text-xs font-medium text-gray-500 block mb-1">2FA TOTP 시크릿 키 (있는 경우)</label>
      <input type="text" name="insta_totp" placeholder="예: YQ754N2HTC7IDAT5..."
        class="w-full px-3 py-2 text-sm rounded-lg border border-gray-200 font-mono">
      <p class="text-xs text-gray-400 mt-1">2fa.live 에서 변환 가능한 시크릿 키</p>
    </div>
    <button type="submit" class="btn btn-primary w-full justify-center py-2.5">저장</button>
  </form>
  {% if request.query_params.get('saved') %}
  <div class="mt-4 px-3 py-2 rounded-lg text-sm text-emerald-700" style="background:rgba(16,185,129,.1);">✅ 저장되었습니다</div>
  {% endif %}
</div>
{% endblock %}
