<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}InstaFinder{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <style>
    * { font-family:"Pretendard Variable",sans-serif; }
    .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s; }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff; }
    .btn-primary:hover { opacity:.88; }
    .btn-ghost { background:transparent;color:#64748b;border:1px solid #e2e8f0; }
    .btn-ghost:hover { background:#f8fafc; }
    .btn-sm { padding:5px 10px;font-size:12px; }
    .card { background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04); }
    .badge { display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600; }
    input,select { outline:none; }
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
  </style>
  {% block head %}{% endblock %}
</head>
<body style="background:#f1f5f9;">
<nav class="bg-white border-b px-6 py-3 flex items-center justify-between sticky top-0 z-10 shadow-sm">
  <div class="flex items-center gap-3">
    <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
      <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
    </div>
    <span class="font-bold text-gray-900 text-sm">InstaFinder</span>
    {% if adv %}<span class="text-xs text-gray-400">| {{ adv.company_name or adv.username }}</span>{% endif %}
  </div>
  <a href="/advertiser/logout" class="text-xs text-gray-400 hover:text-gray-600">로그아웃</a>
</nav>
<main class="min-h-screen"><div class="p-5 max-w-7xl mx-auto">{% block content %}{% endblock %}</div></main>
</body></html>
