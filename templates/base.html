<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}SuperTag{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://openfpcdn.io" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <style>
    * { font-family:"Pretendard Variable",Pretendard,sans-serif; }
    .nav-link { display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#94a3b8;font-size:13.5px;font-weight:500;transition:all .15s; }
    .nav-link:hover { background:#1e293b;color:#e2e8f0; }
    .nav-link.on { background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.35); }
    .nav-link svg { width:17px;height:17px;flex-shrink:0; }
    .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s; }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff; }
    .btn-primary:hover { opacity:.88; }
    .btn-ghost { background:transparent;color:#64748b;border:1px solid #e2e8f0; }
    .btn-ghost:hover { background:#f8fafc; }
    .btn-green { background:linear-gradient(135deg,#10b981,#059669);color:#fff; }
    .btn-green:hover { opacity:.88; }
    .btn-orange { background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff; }
    .btn-sm { padding:5px 10px;font-size:12px; }
    .card { background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04); }
    .badge { display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600; }
    input,select,textarea { outline:none; }
    input:focus,select:focus,textarea:focus { border-color:#6366f1!important; }
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
    .nav-section { padding:4px 12px;font-size:10px;font-weight:700;text-transform:uppercase;color:#475569;letter-spacing:.8px;margin-top:12px;margin-bottom:2px; }
    /* 페이지 전환 로딩바 */
    #pageLoader{position:fixed;top:0;left:0;width:0;height:3px;background:linear-gradient(90deg,#6366f1,#8b5cf6);z-index:9999;transition:width .3s ease;pointer-events:none;}
    #pageLoader.loading{width:70%;transition:width 8s ease-out;}
    #pageLoader.done{width:100%;transition:width .2s ease;opacity:0;transition:width .2s ease, opacity .3s .2s;}
    /* 커스텀 토스트 */
    #stToastWrap{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
    .st-toast{pointer-events:auto;min-width:280px;max-width:400px;padding:14px 18px;border-radius:12px;background:#fff;box-shadow:0 8px 30px rgba(0,0,0,.12);font-size:13px;color:#1e293b;display:flex;align-items:flex-start;gap:10px;animation:stSlideIn .25s ease;line-height:1.5;}
    .st-toast.out{animation:stSlideOut .2s ease forwards;}
    .st-toast-icon{width:20px;height:20px;flex-shrink:0;margin-top:1px;}
    @keyframes stSlideIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}
    @keyframes stSlideOut{to{opacity:0;transform:translateX(40px)}}
    /* 커스텀 confirm 모달 */
    #stConfirmOverlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:10001;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    #stConfirmOverlay.show{display:flex;}
    #stConfirmBox{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:stPopIn .2s ease;}
    #stConfirmMsg{font-size:14px;color:#1e293b;line-height:1.6;margin-bottom:20px;word-break:keep-all;}
    #stConfirmBtns{display:flex;gap:8px;justify-content:flex-end;}
    #stConfirmBtns button{padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
    #stBtnCancel{background:#f1f5f9;color:#64748b;border:none;}
    #stBtnCancel:hover{background:#e2e8f0;}
    #stBtnOk{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;}
    #stBtnOk:hover{opacity:.88;}
    @keyframes stPopIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
    /* 커스텀 alert 모달 (화면 중앙) */
    #stAlertOverlay{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:10002;display:none;align-items:center;justify-content:center;backdrop-filter:blur(2px);}
    #stAlertOverlay.show{display:flex;}
    #stAlertBox{background:#fff;border-radius:16px;padding:28px;max-width:380px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:stPopIn .2s ease;text-align:center;}
    #stAlertMsg{font-size:15px;color:#1e293b;line-height:1.6;margin-bottom:20px;word-break:keep-all;font-weight:500;}
    #stAlertOk{padding:9px 32px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;}
    #stAlertOk:hover{opacity:.88;}
  </style>
  {% block head %}{% endblock %}
</head>
<body style="background:#f1f5f9;">
<div id="pageLoader"></div>
<div id="stToastWrap"></div>
<div id="stConfirmOverlay">
  <div id="stConfirmBox">
    <div id="stConfirmMsg"></div>
    <div id="stConfirmBtns">
      <button id="stBtnCancel">취소</button>
      <button id="stBtnOk">확인</button>
    </div>
  </div>
</div>
<div id="stAlertOverlay">
  <div id="stAlertBox">
    <div id="stAlertMsg"></div>
    <button id="stAlertOk">확인</button>
  </div>
</div>
<script>
// ── 커스텀 toast (alert 대체) ──
function stToast(msg, type) {
  type = type || 'info';
  var wrap = document.getElementById('stToastWrap');
  var t = document.createElement('div');
  t.className = 'st-toast';
  var icons = {
    success: '<svg class="st-toast-icon" fill="none" stroke="#10b981" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    error: '<svg class="st-toast-icon" fill="none" stroke="#ef4444" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>',
    warning: '<svg class="st-toast-icon" fill="none" stroke="#f59e0b" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"/></svg>',
    info: '<svg class="st-toast-icon" fill="none" stroke="#6366f1" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
  };
  t.innerHTML = (icons[type] || icons.info) + '<span>' + msg.replace(/\n/g,'<br>') + '</span>';
  wrap.appendChild(t);
  setTimeout(function(){ t.classList.add('out'); setTimeout(function(){ t.remove(); }, 200); }, 3500);
}

// ── 커스텀 alert 모달 (화면 중앙) ──
var _stAlertResolve = null;
function stAlert(msg) {
  return new Promise(function(resolve) {
    _stAlertResolve = resolve;
    document.getElementById('stAlertMsg').innerHTML = msg.replace(/\n/g,'<br>');
    document.getElementById('stAlertOverlay').classList.add('show');
  });
}
document.getElementById('stAlertOk').onclick = function() {
  document.getElementById('stAlertOverlay').classList.remove('show');
  if (_stAlertResolve) { _stAlertResolve(true); _stAlertResolve = null; }
};
document.getElementById('stAlertOverlay').onclick = function(e) {
  if (e.target === this) {
    this.classList.remove('show');
    if (_stAlertResolve) { _stAlertResolve(true); _stAlertResolve = null; }
  }
};

// ── 커스텀 confirm 대체 ──
var _stConfirmResolve = null;
function stConfirm(msg) {
  return new Promise(function(resolve) {
    _stConfirmResolve = resolve;
    document.getElementById('stConfirmMsg').innerHTML = msg.replace(/\n/g,'<br>');
    document.getElementById('stConfirmOverlay').classList.add('show');
  });
}
document.getElementById('stBtnOk').onclick = function() {
  document.getElementById('stConfirmOverlay').classList.remove('show');
  if (_stConfirmResolve) { _stConfirmResolve(true); _stConfirmResolve = null; }
};
document.getElementById('stBtnCancel').onclick = function() {
  document.getElementById('stConfirmOverlay').classList.remove('show');
  if (_stConfirmResolve) { _stConfirmResolve(false); _stConfirmResolve = null; }
};
document.getElementById('stConfirmOverlay').onclick = function(e) {
  if (e.target === this) {
    this.classList.remove('show');
    if (_stConfirmResolve) { _stConfirmResolve(false); _stConfirmResolve = null; }
  }
};

// ── 전역 alert/confirm 오버라이드 ──
window._origAlert = window.alert;
window.alert = function(msg) { stToast(String(msg), msg && (String(msg).includes('실패') || String(msg).includes('오류') || String(msg).includes('에러')) ? 'error' : msg && (String(msg).includes('완료') || String(msg).includes('성공') || String(msg).includes('표시됨') || String(msg).includes('처리됨')) ? 'success' : 'info'); };
window._origConfirm = window.confirm;
window.confirm = function(msg) {
  // confirm은 동기 함수이므로 기존 form onsubmit 등에서 쓰이면 동기로 동작해야 함
  // async 코드에서는 stConfirm() 사용 권장, 여기서는 동기 폴백 제공
  // 커스텀 모달로 표시하되, 동기 반환이 필요하므로 synchronous 방식으로 처리
  var overlay = document.getElementById('stConfirmOverlay');
  // 이미 promise 기반으로 쓰이는 경우 감지 불가하므로, 동기 폴백
  return window._origConfirm(msg);
};
</script>

<script src="https://openfpcdn.io/botd/v1" async></script>
<script>
// ── 봇 탐지 (BotD + navigator 체크) ──
(function(){
  if(navigator.webdriver){document.cookie='_bot=1;path=/';return;}
  if(typeof navigator.languages==='undefined'||navigator.languages.length===0){document.cookie='_bot=1;path=/';return;}
  // Canvas fingerprint 체크 (headless 브라우저 탐지)
  try{
    var c=document.createElement('canvas'),g=c.getContext('2d');
    g.fillText('test',2,2);
    var d=c.toDataURL();
    if(d.length<100){document.cookie='_bot=1;path=/';return;}
  }catch(e){}
  // BotD 초기화
  if(window.BotD){
    BotD.load().then(function(b){return b.detect()}).then(function(r){
      if(r.bot){document.cookie='_bot=1;path=/';console.warn('Bot detected:',r.bot);}
    }).catch(function(){});
  }
  // Challenge 토큰
  fetch('/api/challenge-token').then(function(r){return r.json()}).then(function(d){
    if(d.token)window.__challengeToken=d.token;
  }).catch(function(){});
})();
// fetch 래퍼: /api/ 호출 시 challenge 토큰 자동 첨부
var _origFetch=window.fetch;
window.fetch=function(url,opts){
  if(typeof url==='string'&&url.indexOf('/api/')===0&&window.__challengeToken){
    opts=opts||{};opts.headers=opts.headers||{};
    if(!opts.headers['X-Challenge-Token'])opts.headers['X-Challenge-Token']=window.__challengeToken;
  }
  return _origFetch.call(this,url,opts);
};
// ── Proof-of-Work 솔버 (비인증 API 요청 시 사용) ──
window.__solvePow=function(challenge,timestamp,difficulty){
  return new Promise(function(resolve){
    var target='0'.repeat(difficulty);
    var worker=new Worker(URL.createObjectURL(new Blob(['onmessage=function(e){var c=e.data.c,t=e.data.t,s=e.data.s,d=e.data.d,target="0".repeat(d);for(var n=0;n<1e8;n++){var data=c+":"+t+":"+n+":"+s;crypto.subtle.digest("SHA-256",new TextEncoder().encode(data)).then(function(h){var hex=Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");if(hex.startsWith(target)){postMessage({nonce:n,hash:hex})}})};setTimeout(function(){postMessage({nonce:-1})},30000)}'],{type:'text/javascript'})));
    // 간단한 동기 PoW (Web Worker 대신 메인 스레드에서 빠르게 처리)
    var n=0;
    function tryBatch(){
      var end=n+50000;
      for(;n<end;n++){
        // 간단 해시 (SubtleCrypto는 비동기라 직접 계산)
        var str=challenge+':'+timestamp+':'+n;
        var hash=0;for(var i=0;i<str.length;i++){hash=((hash<<5)-hash)+str.charCodeAt(i);hash|=0;}
      }
      // SubtleCrypto 사용
      var attempts=[];
      for(var i=n-50000;i<n;i++){
        attempts.push(i);
      }
      // 배치로 확인
      var checkNext=function(idx){
        if(idx>=attempts.length){n+=50000;requestAnimationFrame(tryBatch);return;}
        var data=challenge+':'+timestamp+':'+attempts[idx];
        crypto.subtle.digest('SHA-256',new TextEncoder().encode(data)).then(function(buf){
          var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
          if(hex.startsWith(target)){resolve({nonce:String(attempts[idx]),hash:hex});}
          else{checkNext(idx+1);}
        });
      };
      checkNext(0);
    }
    tryBatch();
  });
};
// ── 페이지 전환 로딩바 + 링크 프리페치 ──
(function(){
  var loader=document.getElementById('pageLoader');
  // 클릭 시 즉시 로딩바
  document.addEventListener('click',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('javascript')||a.target==='_blank'||e.ctrlKey||e.metaKey)return;
    if(href.startsWith('http')&&!href.includes(location.host))return;
    loader.style.width='0';loader.style.opacity='1';
    loader.classList.remove('done');
    requestAnimationFrame(function(){loader.classList.add('loading');});
  });
  window.addEventListener('beforeunload',function(){
    loader.classList.remove('loading');loader.classList.add('done');
  });
  // 호버 시 프리페치
  var prefetched={};
  document.addEventListener('mouseover',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('javascript')||a.target==='_blank')return;
    if(href.startsWith('http')&&!href.includes(location.host))return;
    if(prefetched[href])return;
    prefetched[href]=true;
    var link=document.createElement('link');
    link.rel='prefetch';link.href=href;
    document.head.appendChild(link);
  });
})();
</script>
