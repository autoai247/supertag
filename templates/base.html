<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}SuperTag{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://openfpcdn.io" crossorigin>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css"/>
  <style>
    * { font-family:"Pretendard Variable",Pretendard,sans-serif; }
    .nav-link { display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;color:#94a3b8;font-size:13.5px;font-weight:500;transition:all .15s; }
    .nav-link:hover { background:#1e293b;color:#e2e8f0; }
    .nav-link.on { background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;box-shadow:0 4px 12px rgba(99,102,241,.35); }
    .nav-link svg { width:17px;height:17px;flex-shrink:0; }
    .btn { display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s; }
    .btn-primary { background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff; }
    .btn-primary:hover { opacity:.88; }
    .btn-ghost { background:transparent;color:#64748b;border:1px solid #e2e8f0; }
    .btn-ghost:hover { background:#f8fafc; }
    .btn-green { background:linear-gradient(135deg,#10b981,#059669);color:#fff; }
    .btn-green:hover { opacity:.88; }
    .btn-orange { background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff; }
    .btn-sm { padding:5px 10px;font-size:12px; }
    .card { background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.04); }
    .badge { display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600; }
    input,select,textarea { outline:none; }
    input:focus,select:focus,textarea:focus { border-color:#6366f1!important; }
    ::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
    .nav-section { padding:4px 12px;font-size:10px;font-weight:700;text-transform:uppercase;color:#475569;letter-spacing:.8px;margin-top:12px;margin-bottom:2px; }
    /* 페이지 전환 로딩바 */
    #pageLoader{position:fixed;top:0;left:0;width:0;height:3px;background:linear-gradient(90deg,#6366f1,#8b5cf6);z-index:9999;transition:width .3s ease;pointer-events:none;}
    #pageLoader.loading{width:70%;transition:width 8s ease-out;}
    #pageLoader.done{width:100%;transition:width .2s ease;opacity:0;transition:width .2s ease, opacity .3s .2s;}
  </style>
  {% block head %}{% endblock %}
</head>
<body style="background:#f1f5f9;">
<div id="pageLoader"></div>
<aside class="fixed top-0 left-0 h-screen w-56 flex flex-col z-20" style="background:#0f172a;border-right:1px solid #1e293b;">
  <div class="px-4 py-5 border-b" style="border-color:#1e293b;">
    <a href="/" class="flex items-center gap-2.5">
      <div class="w-7 h-7 rounded-lg flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <span class="font-bold text-white text-sm">SuperTag</span>
    </a>
  </div>
  <nav class="flex-1 px-2 py-3 overflow-y-auto">
    <a href="/influencers" class="nav-link {% if active=='influencers' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
      인플루언서 DB
    </a>
    <a href="/collect" class="nav-link {% if active=='collect' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/></svg>
      계정 수집
    </a>
    <a href="/collect/posts" class="nav-link {% if active=='collect_posts' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      게시물 수집
    </a>
    <a href="/hashtags" class="nav-link {% if active=='hashtags' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 20l4-16m2 16l4-16M6 9h14M4 15h14"/></svg>
      해시태그 관리
    </a>
    <a href="/upload-excel" class="nav-link {% if active=='upload_excel' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
      엑셀 업로드
    </a>
    <a href="/target-extract" class="nav-link {% if active=='target_extract' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
      타겟 추출
    </a>
    <a href="/refresh" class="nav-link {% if active=='refresh' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
      상세 갱신
    </a>
    <a href="/influencers?has_url=1" class="nav-link {% if active=='urls' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
      URL 현황
    </a>
    <div class="nav-section">자동화</div>
    <a href="/automation" class="nav-link {% if active=='automation' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      자동화 현황
    </a>
    <a href="/banned" class="nav-link {% if active=='banned' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"/></svg>
      밴 목록
    </a>
    <div class="nav-section">배포</div>
    <a href="/advertisers" class="nav-link {% if active=='advertisers' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
      광고주 계정
    </a>
    <div class="nav-section">시스템</div>
    <a href="/settings" class="nav-link {% if active=='settings' %}on{% endif %}">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><circle cx="12" cy="12" r="3"/></svg>
      설정
    </a>
  </nav>
  <div class="px-3 py-3 border-t" style="border-color:#1e293b;">
    <div class="flex items-center gap-2 px-2 py-1.5">
      <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs font-bold" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);">
        {{ user.username[0].upper() if user else 'A' }}
      </div>
      <span class="text-gray-400 text-xs flex-1 truncate">{{ user.username if user else '' }}</span>
      <a href="/logout" class="text-gray-600 hover:text-gray-300 transition">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
      </a>
    </div>
  </div>
</aside>
<main class="ml-56 min-h-screen"><div class="p-5">{% block content %}{% endblock %}</div></main>
<script src="https://openfpcdn.io/botd/v1" async></script>
<script>
// ── 봇 탐지 (BotD + navigator 체크) ──
(function(){
  if(navigator.webdriver){document.cookie='_bot=1;path=/';return;}
  if(typeof navigator.languages==='undefined'||navigator.languages.length===0){document.cookie='_bot=1;path=/';return;}
  // Canvas fingerprint 체크 (headless 브라우저 탐지)
  try{
    var c=document.createElement('canvas'),g=c.getContext('2d');
    g.fillText('test',2,2);
    var d=c.toDataURL();
    if(d.length<100){document.cookie='_bot=1;path=/';return;}
  }catch(e){}
  // BotD 초기화
  if(window.BotD){
    BotD.load().then(function(b){return b.detect()}).then(function(r){
      if(r.bot){document.cookie='_bot=1;path=/';console.warn('Bot detected:',r.bot);}
    }).catch(function(){});
  }
  // Challenge 토큰
  fetch('/api/challenge-token').then(function(r){return r.json()}).then(function(d){
    if(d.token)window.__challengeToken=d.token;
  }).catch(function(){});
})();
// fetch 래퍼: /api/ 호출 시 challenge 토큰 자동 첨부
var _origFetch=window.fetch;
window.fetch=function(url,opts){
  if(typeof url==='string'&&url.indexOf('/api/')===0&&window.__challengeToken){
    opts=opts||{};opts.headers=opts.headers||{};
    if(!opts.headers['X-Challenge-Token'])opts.headers['X-Challenge-Token']=window.__challengeToken;
  }
  return _origFetch.call(this,url,opts);
};
// ── Proof-of-Work 솔버 (비인증 API 요청 시 사용) ──
window.__solvePow=function(challenge,timestamp,difficulty){
  return new Promise(function(resolve){
    var target='0'.repeat(difficulty);
    var worker=new Worker(URL.createObjectURL(new Blob(['onmessage=function(e){var c=e.data.c,t=e.data.t,s=e.data.s,d=e.data.d,target="0".repeat(d);for(var n=0;n<1e8;n++){var data=c+":"+t+":"+n+":"+s;crypto.subtle.digest("SHA-256",new TextEncoder().encode(data)).then(function(h){var hex=Array.from(new Uint8Array(h)).map(function(b){return b.toString(16).padStart(2,"0")}).join("");if(hex.startsWith(target)){postMessage({nonce:n,hash:hex})}})};setTimeout(function(){postMessage({nonce:-1})},30000)}'],{type:'text/javascript'})));
    // 간단한 동기 PoW (Web Worker 대신 메인 스레드에서 빠르게 처리)
    var n=0;
    function tryBatch(){
      var end=n+50000;
      for(;n<end;n++){
        // 간단 해시 (SubtleCrypto는 비동기라 직접 계산)
        var str=challenge+':'+timestamp+':'+n;
        var hash=0;for(var i=0;i<str.length;i++){hash=((hash<<5)-hash)+str.charCodeAt(i);hash|=0;}
      }
      // SubtleCrypto 사용
      var attempts=[];
      for(var i=n-50000;i<n;i++){
        attempts.push(i);
      }
      // 배치로 확인
      var checkNext=function(idx){
        if(idx>=attempts.length){n+=50000;requestAnimationFrame(tryBatch);return;}
        var data=challenge+':'+timestamp+':'+attempts[idx];
        crypto.subtle.digest('SHA-256',new TextEncoder().encode(data)).then(function(buf){
          var hex=Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0')}).join('');
          if(hex.startsWith(target)){resolve({nonce:String(attempts[idx]),hash:hex});}
          else{checkNext(idx+1);}
        });
      };
      checkNext(0);
    }
    tryBatch();
  });
};
// ── 페이지 전환 로딩바 + 링크 프리페치 ──
(function(){
  var loader=document.getElementById('pageLoader');
  // 클릭 시 즉시 로딩바
  document.addEventListener('click',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('javascript')||a.target==='_blank'||e.ctrlKey||e.metaKey)return;
    if(href.startsWith('http')&&!href.includes(location.host))return;
    loader.style.width='0';loader.style.opacity='1';
    loader.classList.remove('done');
    requestAnimationFrame(function(){loader.classList.add('loading');});
  });
  window.addEventListener('beforeunload',function(){
    loader.classList.remove('loading');loader.classList.add('done');
  });
  // 호버 시 프리페치
  var prefetched={};
  document.addEventListener('mouseover',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.startsWith('#')||href.startsWith('javascript')||a.target==='_blank')return;
    if(href.startsWith('http')&&!href.includes(location.host))return;
    if(prefetched[href])return;
    prefetched[href]=true;
    var link=document.createElement('link');
    link.rel='prefetch';link.href=href;
    document.head.appendChild(link);
  });
})();
</script>
</body></html>
