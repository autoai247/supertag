app = "instafinder-kr"
primary_region = "nrt"  # Tokyo (한국에서 가장 가까운 fly 리전)

[build]

[env]
  ADMIN_USERNAME = "admin"
  DATA_DIR = "/data"
  DB_PATH = "/data/insta.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "instafinder_data"
  destination = "/data"
  initial_size = "1gb"
