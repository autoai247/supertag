<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; }
    body { width: 320px; background: #0f0f23; color: #e2e8f0; }

    .header {
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      padding: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .header .logo { font-size: 20px; }
    .header h1 { font-size: 14px; font-weight: 700; color: #fff; }
    .header p { font-size: 11px; color: #c4b5fd; margin-top: 2px; }

    .body { padding: 16px; }

    .instagram-status {
      background: #1e1b4b;
      border: 1px solid #3730a3;
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 14px;
    }
    .instagram-status .label { font-size: 10px; color: #818cf8; margin-bottom: 4px; }
    .instagram-status .user {
      font-size: 15px; font-weight: 700; color: #fff;
      display: flex; align-items: center; gap: 6px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; flex-shrink: 0; }
    .dot.off { background: #ef4444; }

    .section-label { font-size: 11px; color: #94a3b8; margin-bottom: 6px; }

    select {
      width: 100%; padding: 9px 12px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; font-size: 13px;
      margin-bottom: 12px; cursor: pointer; outline: none;
    }
    select:focus { border-color: #7c3aed; }

    .sync-btn {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, #7c3aed, #6d28d9);
      border: none; border-radius: 10px;
      color: #fff; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity .2s;
    }
    .sync-btn:hover { opacity: 0.9; }
    .sync-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 12px; padding: 10px 12px;
      border-radius: 8px; font-size: 12px; font-weight: 600;
      display: none;
    }
    .result.ok { background: rgba(16,185,129,.15); color: #34d399; border: 1px solid rgba(16,185,129,.3); }
    .result.err { background: rgba(239,68,68,.15); color: #f87171; border: 1px solid rgba(239,68,68,.3); }

    .footer {
      margin-top: 14px; padding-top: 12px;
      border-top: 1px solid #1e293b;
      display: flex; justify-content: space-between; align-items: center;
    }
    .footer a { font-size: 11px; color: #64748b; text-decoration: none; }
    .footer a:hover { color: #a78bfa; }

    .not-instagram {
      padding: 24px 16px; text-align: center;
    }
    .not-instagram .icon { font-size: 40px; margin-bottom: 12px; }
    .not-instagram p { font-size: 13px; color: #94a3b8; margin-bottom: 16px; }
    .not-instagram a {
      display: inline-block; padding: 10px 20px;
      background: linear-gradient(135deg, #e1306c, #833ab4);
      border-radius: 10px; color: #fff; font-size: 13px;
      font-weight: 700; text-decoration: none;
    }

    .setup-needed {
      padding: 20px 16px; text-align: center;
    }
    .setup-needed p { font-size: 12px; color: #94a3b8; margin-bottom: 12px; line-height: 1.5; }
    .setup-btn {
      width: 100%; padding: 10px;
      background: #7c3aed; border: none; border-radius: 8px;
      color: #fff; font-size: 13px; font-weight: 600; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">📸</div>
    <div>
      <h1>InstaFinder</h1>
      <p>Session Sync</p>
    </div>
  </div>

  <!-- 서버 미설정 -->
  <div id="setupView" class="setup-needed" style="display:none;">
    <div style="font-size:36px;margin-bottom:12px;">⚙️</div>
    <p>먼저 InstaFinder 서버 주소를 설정해야 합니다.</p>
    <button class="setup-btn" onclick="chrome.runtime.openOptionsPage()">설정 열기</button>
  </div>

  <!-- instagram.com 아님 -->
  <div id="notInstaView" class="not-instagram" style="display:none;">
    <div class="icon">📷</div>
    <p>instagram.com에서 수집용 계정으로<br>로그인한 후 이 버튼을 눌러주세요.</p>
    <a href="https://www.instagram.com" target="_blank">instagram.com 열기</a>
  </div>

  <!-- 메인 -->
  <div id="mainView" class="body" style="display:none;">
    <div class="instagram-status">
      <div class="label">현재 Instagram 로그인 상태</div>
      <div class="user">
        <div id="statusDot" class="dot off"></div>
        <span id="igUser">확인 중...</span>
      </div>
    </div>

    <div class="section-label">등록할 계정 선택</div>
    <select id="accSelect">
      <option value="">-- 계정 목록 로딩 중 --</option>
    </select>

    <button class="sync-btn" id="syncBtn" onclick="doSync()" disabled>
      ⚡ 세션 자동 등록
    </button>

    <div id="result" class="result"></div>

    <div class="footer">
      <a href="#" onclick="chrome.runtime.openOptionsPage()">⚙️ 서버 설정</a>
      <a id="serverLink" href="#" target="_blank">대시보드 열기 →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
